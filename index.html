<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>孙筱霏生日快乐🎂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background: linear-gradient(150deg, #f8e6ff 0%, #e0f0ff 100%);
    color:#2c2c44;
    font-family:system-ui, sans-serif;
    min-height:100vh;
    text-align:center;
    padding:6rem 1rem;
    overflow-x:hidden;
}
.float-emo{
    position:fixed;
    font-size:28px;
    opacity:0.55;
    animation: float 7s infinite ease-in-out;
    pointer-events:none;
}
@keyframes float{
    0%{transform: translateY(0px) rotate(0deg);}
    50%{transform: translateY(-22px) rotate(6deg);}
    100%{transform: translateY(0px) rotate(0deg);}
}
.star{
    position:fixed;
    width:4px;height:4px;
    background:#fff;
    border-radius:50%;
    opacity:0.5;
    animation:twinkle 3.5s infinite alternate;
}
@keyframes twinkle{
    from{opacity:0.15;transform:scale(0.6)}
    to{opacity:0.8;transform:scale(1.4)}
}
.title{
    font-size:46px;
    color:#c04890;
    text-shadow: 0 0 14px #ffb8dd77;
    margin-bottom:12px;
    letter-spacing:2px;
}
.sub{
    font-size:16px;
    color:#54547a;
    margin-bottom:40px;
    letter-spacing:1px;
}
.card{
    max-width:600px;
    margin:0 auto;
    padding:48px 32px;
    border:1px solid rgba(255,255,255,0.6);
    border-radius:24px;
    background: rgba(255, 255, 255, 0.32);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(130, 160, 220, 0.18);
}
.desc{
    line-height:1.95;
    font-size:17px;
    margin:22px 0;
}
.opt-btn{
    display:block;
    width:82%;
    margin:14px auto;
    padding:15px;
    border:none;
    border-radius:999px;
    font-size:16px;
    cursor:pointer;
    transition:0.25s ease;
}
.btn1{background:rgba(84, 160, 255, 0.85);color:#fff;}
.btn2{background:rgba(255, 126, 179, 0.85);color:#fff;}
.btn3{background:rgba(123, 97, 255, 0.85);color:#fff;}
.opt-btn:hover{
    transform:scale(1.04);
    box-shadow:0 4px 16px rgba(0,0,0,0.08);
}
#fireCanvas{
    position:fixed;
    top:0;left:0;
    width:100vw;height:100vh;
    pointer-events:none;
    z-index:99;
    background: transparent;
}
.pop{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.4);
    backdrop-filter: blur(14px);
    border:1px solid rgba(255,255,255,0.7);
    padding:38px;
    border-radius:22px;
    z-index:100;
    display:none;
    box-shadow:0 10px 40px rgba(100,120,180,0.15);
}
.pop p{font-size:18px;margin-bottom:22px;color:#2c2c44;line-height:1.8}
.close{
    padding:9px 24px;
    border:none;
    border-radius:999px;
    background:rgba(255, 126, 179, 0.9);
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>
<div class="float-emo" style="top:12%;left:7%;animation-delay:0s;">🧁</div>
<div class="float-emo" style="top:26%;right:5%;animation-delay:1.2s;">🎀</div>
<div class="float-emo" style="top:62%;left:4%;animation-delay:2.4s;">🫧</div>
<div class="float-emo" style="top:76%;right:9%;animation-delay:3.6s;">🍬</div>
<div class="float-emo" style="top:9%;right:14%;animation-delay:4.8s;">💫</div>
<div class="float-emo" style="top:44%;left:2%;animation-delay:6s;">☁️</div>

<canvas id="fireCanvas"></canvas>
<div class="card">
    <h1 class="title">🎆祝孙筱霏生日快乐🎂</h1>
    <p class="sub">✨生辰：2011.06.18 | 专属赛博礼物💌</p>
    <p class="desc">
    没法线下见面送礼物🥺，搭了这个专属小网站送给我最好的朋友孙筱霏<br>
    新一岁吃好喝好🍰奶茶管够🥤，烦恼全跑👋，好运常驻🌟，所有心愿通通落地🎁！
    </p>
    <button class="opt-btn btn1" onclick="launchFire()">🎇放烟花</button>
    <button class="opt-btn btn2" onclick="randomWish()">🎁抽祝福</button>
    <button class="opt-btn btn3" onclick="showWishBox()">🙏许心愿</button>
    <button class="opt-btn" style="background:rgba(255, 193, 227, 0.75);color:#2c2c44;margin-top:28px" onclick="playBgm()">🎵播放音乐</button>
    <div style="margin-top:32px;font-size:38px">🍧🧸🫐💐🪁🌷</div>
</div>

<div class="pop" id="popBox">
    <p id="popText"></p>
    <button class="close" onclick="closePop()">关闭✖️</button>
</div>

<audio id="bgm" loop>
    <source src="https://music.163.com/song/media/outer/url?id=2114134871.mp3">

<script>
function createStar(){
    for(let i=0;i<130;i++){
        let star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random()*100+'%';
        star.style.top = Math.random()*100+'%';
        star.style.animationDelay = Math.random()*3.5+'s';
        document.body.appendChild(star);
    }
}
createStar();

function playBgm(){
    document.getElementById('bgm').play();
}

const wishList = [
    "🍔孙筱霏！新一岁狂吃不胖，零花钱暴涨💰，考试全超常发挥📝！",
    "🥳祝我的好朋友筱霏：每天开心🥰，没有糟心事，游戏把把连胜🎮！",
    "🌟2011.6.18出生的天才少女孙筱霏，岁岁无忧，万事顺意🍃！",
    "✨筱霏专属buff生效：霉运清零，好运满格，想要的全都拥有🎁！",
    "🥤远程投喂奶茶蛋糕！见面双倍补给，孙筱霏生日快乐🎂！",
    "☁️新一岁自由自在，不用焦虑，永远做无忧无虑的小朋友🧸！",
    "🪐赛博宇宙全部好运打包送给孙筱霏，今年暴富暴美！💎",
    "🎀所有难过退退退！筱霏每天都有细碎的小幸福环绕🫧"
];

function randomWish(){
    let text = wishList[Math.floor(Math.random()*wishList.length)];
    document.getElementById('popText').innerText = text;
    document.getElementById('popBox').style.display = 'block';
}
function showWishBox(){
    document.getElementById('popText').innerText = "🌙对着屏幕许愿吧！赛博星空会替我记住孙筱霏所有愿望，一定会实现✨";
    document.getElementById('popBox').style.display = 'block';
}
function closePop(){
    document.getElementById('popBox').style.display = 'none';
}

// 稳定烟花代码
const canvas = document.getElementById('fireCanvas');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;
window.addEventListener('resize',()=>{
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});

let fireArr = [];
class Spark{
    constructor(x,y,c){
        this.x=x;this.y=y;
        this.vx=(Math.random()-0.5)*6;
        this.vy=(Math.random()-0.5)*6;
        this.a=1;
        this.color=c;
    }
    update(){
        this.x+=this.vx;
        this.y+=this.vy;
        this.a-=0.02;
    }
    draw(){
        ctx.save();
        ctx.globalAlpha=this.a;
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x,this.y,2,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

window.launchFire = function(){
    let color = `hsl(${Math.random()*360},100%,70%)`;
    for(let i=0;i<100;i++){
        fireArr.push(new Spark(width/2,height/3,color));
    }
}

function render(){
    ctx.clearRect(0,0,width,height);
    for(let i=fireArr.length-1;i>=0;i--){
        fireArr[i].update();
        fireArr[i].draw();
        if(fireArr[i].a<=0) fireArr.splice(i,1);
    }
    requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
